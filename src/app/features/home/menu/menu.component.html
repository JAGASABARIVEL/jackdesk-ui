<div class="card">
    <p-megamenu [model]="items" [style]="{ 'border-radius': '4rem', display: 'flex' }" styleClass="p-4 bg-surface-0 dark:bg-surface-900">

        <ng-template #item let-item>
            <div (click)="onMenuSelect(item)">

            
            <a *ngIf="item.root" pRipple class="flex items-center cursor-pointer px-4 py-2 overflow-hidden relative font-semibold text-lg uppercase" style="border-radius: 2rem">
                <i [ngClass]="item.icon"></i>
                <span class="ml-2">{{ item.label }}</span>
            </a>
            <a *ngIf="!item.root && !item.image" class="flex items-center p-4 cursor-pointer mb-2 gap-2">
                <span class="inline-flex items-center justify-center rounded-full">
                    <i [ngClass]="item.icon + ' text-lg'"></i>
                </span>
                <span class="inline-flex flex-col gap-1">
                    <span class="font-medium text-lg text-surface-900 dark:text-surface-0">{{ item.label }}</span>
                    <span class="p-text-secondary">{{ item.subtext }}</span>
                </span>
            </a>
        </div>
            <div *ngIf="item.image" class="flex flex-col items-start gap-4">
                <img [src]="item.image" alt="megamenu-demo" class="get-started-img w-full" />
            </div>
            <div *ngIf="item.image" class="flex flex-row gap-4 mt-4 mb-4">
                <span>{{ item.subtext }}</span>
                <p-button [label]="item.label" [outlined]="true" (click)="onMenuSelect({'label':'Pricing'})"></p-button>
            </div>
        </ng-template>
    </p-megamenu>
</div>

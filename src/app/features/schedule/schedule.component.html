<div class="schedule-container" *ngIf="profile?.user?.role !== 'individual'">
    <div class="schedule-header">
        <div class="header-content">
            <h1 class="page-title">Campaign Manager</h1>
            <p class="page-subtitle">Create, manage, and track your messaging campaigns</p>
        </div>
    </div>

    <p-tabs value="0" styleClass="modern-tabs">
        <p-tablist>
            <p-tab value="0" class="modern-tab">
                <div class="tab-content">
                    <i class="pi pi-send tab-icon"></i>
                    <span class="tab-label">Compose</span>
                </div>
            </p-tab>
            <p-tab value="1" class="modern-tab">
                <div class="tab-content">
                    <i class="pi pi-calendar-clock tab-icon"></i>
                    <span class="tab-label">Schedules</span>
                    <p-badge *ngIf="total_schedules > 0" [value]="total_schedules" severity="info" />
                </div>
            </p-tab>
            <p-tab value="2" class="modern-tab">
                <div class="tab-content">
                    <i class="pi pi-history tab-icon"></i>
                    <span class="tab-label">History</span>
                    <p-badge *ngIf="failedMessageCounts > 0" [value]="failedMessageCounts" severity="danger" />
                </div>
            </p-tab>
        </p-tablist>
        <p-tabpanels>
            <p-tabpanel value="0">
                <app-compose-message></app-compose-message>
            </p-tabpanel>

            <p-tabpanel value="1">
                <app-crud-schedules (totalSchedules)="onTotalSchedulesHandler($event)"></app-crud-schedules>
            </p-tabpanel>

            <p-tabpanel value="2">
                <app-message-history (onFailedMessage)="onFailedMessageHandler($event)"></app-message-history>
            </p-tabpanel>
        </p-tabpanels>
    </p-tabs>
</div>

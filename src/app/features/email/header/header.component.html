<div class="flex flex-column gap-4">
    <div class="flex justify-content-between w-full gap-8">
        <div class="flex gap-2 align-items-center">
            <!--i class="pi pi-sync" style="font-size: 1rem; color: var(--primary-color)"></i-->
            <input pInputText type="text" [(ngModel)]="search" (ngModelChange)="onSearchChange()"
                placeholder="Search mail..." class="p-inputtext-md w-full shadow-1" />
            
                
            
                
        </div>

        <div class="flex gap-4">
            <div class="flex">
                <button pButton icon="pi pi-pencil" class="p-button-sm p-button-outlined px-3 shadow-1" label="New Email"
                    (click)="compose.emit()"></button>
                
            </div>
            <div class="flex gap-1">
                <button pButton icon="pi pi-reply" class="mr-2 p-button-sm p-button-outlined shadow-1">
                </button>
                <button pButton class="mr-2 p-button-sm p-button-outlined flex items-center gap-1 shadow-1">
                    <i class="pi pi-reply"></i>
                    <i class="pi pi-reply"></i>
                </button>
                <button pButton icon="pi pi-arrow-right" class="p-button-sm p-button-outlined shadow-1"></button>
                <button pButton icon="pi pi-trash" class="p-button-sm ml-1 p-button-outlined shadow-1"></button>
            </div>
            <div class="flex">
                <button pButton icon="pi pi-times" class="p-button-sm p-button-outlined shadow-1"
                    (click)="onCloseMailbox();"></button>
            </div>
        </div>



    </div>


</div>

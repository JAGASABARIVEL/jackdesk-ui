<div class="modern-contact-card">
    <p-toast />
    
    <!-- Modern Action Bar -->
    <div class="action-bar">
        <div class="action-left">
            <button pButton class="modern-btn modern-btn-primary" label="New Contact" icon="pi pi-plus" (click)="openNew()"></button>
            <button *ngIf="profile?.user.role === 'owner'" pButton class="modern-btn modern-btn-danger" label="Delete Selected" icon="pi pi-trash" (click)="deleteSelectedProducts()" [disabled]="!selectedProducts || !selectedProducts.length"></button>
        </div>
        <div class="action-right">
            <button pButton class="modern-btn modern-btn-secondary" label="Reload" icon="pi pi-replay" (click)="loadContacts()"></button>
            <p-fileUpload #fileUpload mode="basic" accept=".xls,.xlsx" [maxFileSize]="1000000" chooseLabel="Import" class="modern-file-upload" fileLimit="1" (onSelect)="onBulkUpload($event, fileUpload)" />
        </div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
        <span class="p-input-icon-left search-wrapper">
            <i class="pi pi-search search-icon"></i>
            <input pInputText type="text" #searchInput (input)="onSearchInput($event, dt)" placeholder="Search contacts by name, phone, or category..." class="search-input" />
        </span>
    </div>

    <!-- Modern Table -->
    <p-table #dt [value]="products" [rows]="10" [paginator]="true" [globalFilterFields]="['_search_blob']" [tableStyle]="{ 'min-width': '75rem' }" [(selection)]="selectedProducts" [rowHover]="true" dataKey="id" [loading]="loading" currentPageReportTemplate="Showing {first} to {last} of {totalRecords} contacts" [showCurrentPageReport]="true" styleClass="modern-table">
        
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 3rem">
                    <p-tableHeaderCheckbox />
                </th>
                <th style="width: 4rem"></th>
                <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
                <th pSortableColumn="phone">Phone <p-sortIcon field="phone" /></th>
                <th pSortableColumn="category">Category <p-sortIcon field="category" /></th>
                <th pSortableColumn="description">Description <p-sortIcon field="description" /></th>
                <th style="width: 10rem">Actions</th>
            </tr>
        </ng-template>
        
        <ng-template pTemplate="body" let-product>
            <tr class="table-row">
                <td>
                    <p-tableCheckbox [value]="product" />
                </td>
                <td>
                    <div class="avatar-container">
                        <img *ngIf="product?.image" [src]="product.image" alt="avatar" class="contact-avatar"/>
                        <p-avatar *ngIf="!product?.image" icon="pi pi-user" styleClass="contact-avatar-icon" size="large" />
                    </div>
                </td>
                <td>
                    <span class="contact-name">{{ product.name }}</span>
                </td>
                <td>
                    <span class="contact-phone">{{ product.phone }}</span>
                </td>
                <td>
                    <p-tag [value]="product.category || 'N/A'" [severity]="getSeverity(product.category)" styleClass="modern-tag" />
                </td>
                <td>
                    <span class="contact-description">{{ product.description }}</span>
                </td>
                <td class="actions-cell">
                    <div class="action-buttons">
                      <!--button 
                        pButton
                        icon="pi pi-eye" 
                        class="action-btn"
                        (click)="viewCustomerDetail(product.id)"
                        pTooltip="View Details">
                      </button-->
                      <button 
                          pButton
                          icon="pi pi-user-edit" 
                          class="action-btn action-btn-edit"
                          [rounded]="true" (click)="editProduct(product)" pTooltip="Edit" tooltipPosition="top">
                      </button>
                      <button 
                          pButton 
                          icon="pi pi-trash" 
                          class="action-btn close-btn"
                          tooltipPosition="top"
                          [rounded]="true" (click)="deleteProduct(product)" pTooltip="Delete">
                      </button>
                    </div>
                </td>
            </tr>
        </ng-template>
        
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="7" class="empty-message">
                    <div class="empty-state">
                        <i class="pi pi-inbox empty-icon"></i>
                        <p class="empty-text">No contacts found</p>
                        <p class="empty-subtext">Create your first contact to get started</p>
                    </div>
                </td>
            </tr>
        </ng-template>
        
        <ng-template pTemplate="summary">
            <div class="table-summary">
                <i class="pi pi-users summary-icon"></i>
                <span class="summary-text">Total: <strong>{{ products ? products.length : 0 }}</strong> contacts</span>
            </div>
        </ng-template>
    </p-table>

    <!-- Modern Dialog -->
    <p-dialog [(visible)]="productDialog" [style]="{ width: '550px' }" header="Contact Details" [modal]="true" styleClass="modern-dialog">
        <ng-template pTemplate="content">
            <div class="dialog-content">
                <!-- Avatar Section -->
                <div class="avatar-section">
                    <img *ngIf="product?.image" [src]="product.image" alt="avatar" class="dialog-avatar"/>
                    <p-avatar *ngIf="!product?.image" icon="pi pi-user" styleClass="dialog-avatar-placeholder" size="xlarge" />
                </div>

                <!-- Form Fields -->
                <div class="form-group">
                    <label for="name" class="form-label">Name <span class="required">*</span></label>
                    <input type="text" pInputText id="name" [(ngModel)]="product.name" required autofocus class="form-input" placeholder="Enter contact name"/>
                    <small class="error-message" *ngIf="submitted && !product.name">Name is required</small>
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description" pInputTextarea [(ngModel)]="product.description" rows="3" class="form-input" placeholder="Enter description"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Category</label>
                    <div class="radio-grid">
                        <div class="radio-item" *ngFor="let cat of ['Individual', 'Micro Enterprise', 'Small Enterprise', 'Medium Enterprise']; let i = index">
                            <p-radioButton [inputId]="'category' + i" name="category" [value]="cat" [(ngModel)]="product.category" />
                            <label [for]="'category' + i" class="radio-label">{{ cat }}</label>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone" class="form-label">Contact <span class="required">*</span></label>
                        <input type="text" pInputText id="phone" [(ngModel)]="product.phone" required class="form-input" placeholder="Phone number"/>
                        <small class="error-message" *ngIf="submitted && !product.phone">Contact is required</small>
                    </div>

                    <div class="form-group">
                        <label for="platform" class="form-label">Platform</label>
                        <p-select class="form-input" [options]="supported_platforms" [(ngModel)]="product.platform_name" optionValue="name" optionLabel="name" [filter]="true" filterBy="name" appendTo="body" [showClear]="true" placeholder="Select platform"></p-select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address" class="form-label">Address</label>
                    <textarea id="address" pInputTextarea [(ngModel)]="product.address" rows="2" class="form-input" placeholder="Enter address"></textarea>
                </div>

                <!-- Dynamic Custom Fields -->
                <div class="custom-fields" *ngIf="customFieldDefs?.length > 0">
                    <h4 class="custom-fields-title">Custom Fields</h4>
                    <div class="form-group" *ngFor="let field of customFieldDefs">
                        <label class="form-label">{{ field.name }}</label>
                        <input *ngIf="field.field_type === 'text'" type="text" pInputText [(ngModel)]="product.custom_fields[field.key]" class="form-input"/>
                        <input *ngIf="field.field_type === 'number'" type="number" pInputText [(ngModel)]="product.custom_fields[field.key]" class="form-input"/>
                        <p-calendar *ngIf="field.field_type === 'date'" [(ngModel)]="product.custom_fields[field.key]" dateFormat="yy-mm-dd" [showIcon]="true" class="form-input"></p-calendar>
                        <p-dropdown *ngIf="field.field_type === 'select'" [options]="field.options" optionLabel="label" optionValue="value" placeholder="Select {{ field.name }}" [(ngModel)]="product.custom_fields[field.key]" class="form-input"></p-dropdown>
                        <div *ngIf="field.field_type === 'boolean'" class="switch-container">
                            <p-inputSwitch [(ngModel)]="product.custom_fields[field.key]"></p-inputSwitch>
                        </div>
                    </div>
                </div>
            </div>
        </ng-template>

        <ng-template pTemplate="footer">
            <div class="dialog-footer">
                <button pButton label="Cancel" icon="pi pi-times" class="modern-btn modern-btn-secondary" (click)="hideDialog()"></button>
                <button pButton label="Save Contact" icon="pi pi-check" class="modern-btn modern-btn-primary" [disabled]="!product.name || !product.phone" (click)="saveProduct()"></button>
            </div>
        </ng-template>
    </p-dialog>

    <p-confirmDialog styleClass="modern-confirm-dialog" />
</div>

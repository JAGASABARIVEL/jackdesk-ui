<div class="flex flex-column gap-4">

  <!-- === Summary Box === -->
  <div class="card summary-box">
    <div class="flex flex-column gap-2">
      <div class="flex">
        <strong style="min-width: 130px;">Selected Duration</strong>
        <div>: {{ totalSummary?.selectedDuration }}</div>
      </div>

      <div class="flex">
        <strong style="min-width: 130px;">Active</strong>
        <div>: {{ totalSummary?.active }}</div>
      </div>

      <div class="flex">
        <strong style="min-width: 130px;">Idle</strong>
        <div>: {{ totalSummary?.idle }}</div>
      </div>
    </div>
  </div>

  <!-- === Charts Row 1 === -->
  <div class="grid">
    <!-- Idle vs Active -->
    <div class="card col-6">
      <p-chart 
        type="pie" 
        [data]="idlePieChartData" 
        [options]="pieChartOptions" 
        height="350px" 
        width="100%">
      </p-chart>
    </div>

    <!-- Productivity Over Time -->
    <div class="card col-6">
      <p-chart
        type="line"
        [data]="productivityLineChartData"
        [options]="productivityLineChartOptions"
        height="350px"
        width="100%">
      </p-chart>
    </div>
  </div>

  <!-- === Charts Row 2 === -->
  <div class="grid">
    <!-- Top App Usage Trends -->
    <div class="card col-12">
      <div class="flex flex-column">
        <div class="flex justify-content-end">
          <p-select
            [options]="[3, 5, 10]"
            [(ngModel)]="topN"
            placeholder="Top N Apps"
            (onChange)="prepareTopUsageAppCharts()">
          </p-select>
        </div>

        <p-chart
          type="bar"
          [data]="topAppsOverTimeChartData"
          [options]="topAppsOverTimeChartOptions"
          height="350px"
          width="100%">
        </p-chart>
      </div>
    </div>
  </div>

  <!-- === Charts Row 3 === -->
  <div class="grid">
    <!-- All App Usage (full list) -->
    <div class="card col">
      <p-chart 
        type="bar" 
        [data]="appUsageChartData" 
        [options]="barChartOptions"
        height="350px"
        width="100%">
      </p-chart>
    </div>
  </div>

</div>
